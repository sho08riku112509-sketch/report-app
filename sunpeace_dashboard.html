<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SunPeace チーム中山 管理ダッシュボード</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap');
  :root{--bg:#0f1117;--surface:#1a1d27;--surface2:#222535;--border:#2e3247;--accent:#4f9cf9;--accent2:#f97316;--green:#22c55e;--red:#ef4444;--yellow:#eab308;--text:#e2e8f0;--text2:#94a3b8;--text3:#64748b;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
  .header{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;flex-wrap:wrap;gap:8px;}
  .header-left{display:flex;align-items:center;gap:12px;}
  .header-logo{font-size:16px;font-weight:700;color:var(--accent);}
  .header-badge{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:4px 10px;font-size:11px;color:var(--text2);}
  .tabs{display:flex;gap:4px;background:var(--surface2);padding:4px;border-radius:8px;}
  .tab{padding:6px 16px;border-radius:6px;font-size:13px;font-weight:500;cursor:pointer;border:none;background:transparent;color:var(--text2);transition:all .15s;font-family:inherit;}
  .tab.active{background:var(--accent);color:white;}
  .tab:hover:not(.active){background:var(--border);color:var(--text);}
  .main{padding:24px;max-width:1400px;margin:0 auto;}
  .page{display:none;}.page.active{display:block;}
  .controls{display:flex;gap:12px;margin-bottom:20px;align-items:flex-end;flex-wrap:wrap;}
  .ctrl-group{display:flex;flex-direction:column;gap:4px;}
  .ctrl-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;}
  .month-tabs{display:flex;gap:4px;background:var(--surface2);padding:4px;border-radius:8px;}
  .month-tab{padding:5px 14px;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;border:none;background:transparent;color:var(--text2);transition:all .15s;font-family:inherit;}
  .month-tab.active{background:var(--accent);color:white;}
  .month-tab:hover:not(.active){color:var(--text);}
  select{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:7px 12px;border-radius:6px;font-size:13px;font-family:inherit;cursor:pointer;min-width:130px;}
  select:focus{outline:none;border-color:var(--accent);}
  .kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:12px;margin-bottom:20px;}
  .kpi-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;}
  .kpi-label{font-size:11px;color:var(--text3);margin-bottom:6px;text-transform:uppercase;letter-spacing:.06em;}
  .kpi-value{font-size:22px;font-weight:700;font-family:'DM Mono',monospace;}
  .kpi-value.green{color:var(--green);}.kpi-value.yellow{color:var(--yellow);}.kpi-value.red{color:var(--red);}.kpi-value.blue{color:var(--accent);}
  .kpi-sub{font-size:11px;color:var(--text3);margin-top:4px;}
  .table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;}
  .table-header-row{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
  .table-title{font-size:13px;font-weight:600;color:var(--text2);}
  table{width:100%;border-collapse:collapse;font-size:12px;}
  thead th{background:var(--surface2);padding:8px 10px;text-align:right;color:var(--text3);font-weight:500;font-size:11px;border-bottom:1px solid var(--border);white-space:nowrap;}
  thead th:first-child,thead th:nth-child(2){text-align:center;}
  thead th.g1{border-left:2px solid var(--accent);}
  thead th.g2{border-left:2px solid var(--accent2);}
  tbody tr{border-bottom:1px solid var(--border);transition:background .1s;}
  tbody tr:hover{background:var(--surface2);}
  td{padding:7px 10px;text-align:right;font-family:'DM Mono',monospace;font-size:12px;color:var(--text);white-space:nowrap;}
  td:first-child,td:nth-child(2){text-align:center;font-family:'Noto Sans JP',sans-serif;color:var(--text2);}
  td.hi{color:var(--accent);font-weight:500;}td.ad{color:var(--accent2);}td.em{color:var(--text3);}
  tbody tr.sum-row{background:var(--surface2);border-top:2px solid var(--border);}
  tbody tr.sum-row td{font-weight:700;}
  .scroll-x{overflow-x:auto;}
  .rank-controls{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;align-items:center;}
  .sort-btn{padding:6px 14px;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--surface2);color:var(--text2);transition:all .15s;font-family:inherit;}
  .sort-btn.active{background:var(--accent2);border-color:var(--accent2);color:white;}
  .sort-btn:hover:not(.active){border-color:var(--accent);color:var(--text);}
  .rank-table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;}
  .rank-table th{background:var(--surface2);padding:10px 14px;text-align:right;color:var(--text3);font-size:11px;font-weight:500;border-bottom:1px solid var(--border);white-space:nowrap;}
  .rank-table th:first-child,.rank-table th:nth-child(2){text-align:left;}
  .rank-table td{padding:10px 14px;border-bottom:1px solid var(--border);font-family:'DM Mono',monospace;font-size:13px;text-align:right;}
  .rank-table td:first-child{text-align:center;font-size:15px;font-weight:700;width:48px;}
  .rank-table td:nth-child(2){text-align:left;font-family:'Noto Sans JP',sans-serif;font-size:13px;font-weight:500;color:var(--text);}
  .r1{color:#f59e0b;}.r2{color:#94a3b8;}.r3{color:#cd7c2f;}
  .bar-wrap{display:flex;align-items:center;gap:8px;justify-content:flex-end;}
  .bar-bg{width:80px;height:4px;background:var(--border);border-radius:2px;overflow:hidden;}
  .bar-fill{height:100%;border-radius:2px;background:var(--accent);}
  .bar-fill.o{background:var(--accent2);}.bar-fill.g{background:var(--green);}
  .badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;}
  .badge.ov{background:rgba(34,197,94,.15);color:var(--green);}
  .badge.un{background:rgba(239,68,68,.1);color:var(--red);}
  .badge.mi{background:rgba(234,179,8,.1);color:var(--yellow);}
</style>
</head>
<body>
<div class="header">
  <div class="header-left">
    <div class="header-logo">SunPeace</div>
    <div class="header-badge" id="header-badge">チーム中山</div>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="switchPage('daily',this)">個人日報</button>
    <button class="tab" onclick="switchPage('ranking',this)">チームランキング</button>
  </div>
</div>
<div class="main">

  <div class="page active" id="page-daily">
    <div class="controls">
      <div class="ctrl-group">
        <div class="ctrl-label">月</div>
        <div class="month-tabs" id="daily-month-tabs">
          <button class="month-tab" onclick="setMonth(2,this)">2月</button>
          <button class="month-tab active" onclick="setMonth(3,this)">3月</button>
        </div>
      </div>
      <div class="ctrl-group">
        <div class="ctrl-label">メンバー</div>
        <select id="member-select" onchange="renderDaily()"></select>
      </div>
    </div>
    <div class="kpi-row" id="kpi-daily"></div>
    <div class="table-wrap">
      <div class="table-header-row">
        <div class="table-title" id="daily-title"></div>
        <div style="font-size:11px;color:var(--text3)">月次目標: <span id="daily-target" style="color:var(--accent);font-family:'DM Mono'"></span></div>
      </div>
      <div class="scroll-x">
        <table>
          <thead><tr>
            <th>日</th><th>稼働</th><th>件数</th>
            <th class="g1">基本売上</th>
            <th class="g2">追加内機</th><th>追加外機</th><th>追加ロボ</th><th>追加RF</th><th>追加水回り</th><th>追加抗菌</th><th>追加その他</th>
            <th>追加計</th><th>日次合計</th><th>累計</th>
          </tr></thead>
          <tbody id="daily-tbody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="page" id="page-ranking">
    <div class="controls">
      <div class="ctrl-group">
        <div class="ctrl-label">月</div>
        <div class="month-tabs" id="rank-month-tabs">
          <button class="month-tab" onclick="setMonth(2,this)">2月</button>
          <button class="month-tab active" onclick="setMonth(3,this)">3月</button>
        </div>
      </div>
    </div>
    <div class="kpi-row" id="kpi-ranking"></div>
    <div class="rank-controls">
      <span style="font-size:11px;color:var(--text3);margin-right:4px">並び替え：</span>
      <button class="sort-btn active" onclick="setSort('total',this)">売上順</button>
      <button class="sort-btn" onclick="setSort('add_rate',this)">追加率順</button>
      <button class="sort-btn" onclick="setSort('ext_rate',this)">外機付帯率順</button>
      <button class="sort-btn" onclick="setSort('days',this)">稼働日数順</button>
      <button class="sort-btn" onclick="setSort('day_avg',this)">1Day平均順</button>
    </div>
    <div class="rank-table-wrap">
      <div class="scroll-x">
        <table class="rank-table" style="width:100%;border-collapse:collapse;">
          <thead><tr>
            <th>#</th><th>名前</th>
            <th>稼働</th><th>売上</th><th>達成率</th>
            <th>追加率</th><th>外機付帯率</th><th>1Day平均</th>
          </tr></thead>
          <tbody id="rank-tbody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

let currentMonth = 3;
let currentSort = 'total';

function f(n){return n?n.toLocaleString():'—';}
function p(n){return n.toFixed(1)+'%';}

function getMembers(month){
  const d = ALL_DATA[String(month)];
  return Object.entries(d).map(([name, v]) => ({name, team:'チーム中山', ...v}));
}

function setMonth(m, btn){
  currentMonth = m;
  document.querySelectorAll('.month-tab').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.month-tab').forEach(b => {
    if(b.textContent === m+'月') b.classList.add('active');
  });
  document.getElementById('header-badge').textContent = 'チーム中山 — R8年'+m+'月 実績';
  updateMemberSelect();
  renderDaily();
  renderRanking();
}

function updateMemberSelect(){
  const sel = document.getElementById('member-select');
  const cur = sel.value;
  const names = Object.keys(ALL_DATA[String(currentMonth)]).sort((a,b)=>{
    const ta = ALL_DATA[String(currentMonth)][a].total;
    const tb = ALL_DATA[String(currentMonth)][b].total;
    return tb - ta;
  });
  sel.innerHTML = names.map(n => `<option value="${n}"${n===cur?'selected':''}>${n}</option>`).join('');
  if(!names.includes(cur)) sel.value = names[0];
}

function renderDaily(){
  const name = document.getElementById('member-select').value;
  if(!name) return;
  const d = ALL_DATA[String(currentMonth)][name];
  if(!d) return;

  document.getElementById('daily-title').textContent = name + ' — R8年'+currentMonth+'月（実績）';
  document.getElementById('daily-target').textContent = '¥'+d.target.toLocaleString();

  const diff = d.total - d.target;
  const diffText = diff >= 0
    ? '目標超過 ¥'+Math.round(diff/10000)+'万'
    : '残 ¥'+Math.round(Math.abs(diff)/10000)+'万';

  document.getElementById('kpi-daily').innerHTML=`
    <div class="kpi-card"><div class="kpi-label">累計売上</div><div class="kpi-value blue">¥${Math.round(d.total/10000)}万</div><div class="kpi-sub">目標 ¥${Math.round(d.target/10000)}万</div></div>
    <div class="kpi-card"><div class="kpi-label">達成率</div><div class="kpi-value ${d.achieve>=100?'green':d.achieve>=80?'yellow':'red'}">${p(d.achieve)}</div><div class="kpi-sub">${diffText}</div></div>
    <div class="kpi-card"><div class="kpi-label">稼働日数</div><div class="kpi-value blue">${d.days}<span style="font-size:14px;color:var(--text2)">日</span></div><div class="kpi-sub">1Day平均 ¥${d.day_avg?Math.round(d.day_avg/1000)+'k':'—'}</div></div>
    <div class="kpi-card"><div class="kpi-label">追加率</div><div class="kpi-value ${d.add_rate>=80?'green':d.add_rate>=50?'yellow':'red'}">${p(d.add_rate)}</div><div class="kpi-sub">追加計 ¥${Math.round(d.add_total/10000)}万</div></div>
    <div class="kpi-card"><div class="kpi-label">外機付帯率</div><div class="kpi-value ${d.ext_rate>=20?'green':d.ext_rate>=10?'yellow':'red'}">${p(d.ext_rate)}</div></div>
  `;

  let html='', cum=0;
  d.daily.forEach(r=>{
    if(!r.w){html+=`<tr><td>${r.day}</td><td class="em">休</td><td class="em" colspan="12">—</td></tr>`;return;}
    cum+=r.t;
    html+=`<tr><td>${r.day}</td><td>○</td><td>${r.c}</td>
      <td class="hi">${f(r.b)}</td>
      <td class="ad">${r.an?f(r.an):'—'}</td><td class="ad">${r.ag?f(r.ag):'—'}</td>
      <td class="ad">${r.ar?f(r.ar):'—'}</td><td class="ad">${r.af?f(r.af):'—'}</td>
      <td class="ad">${r.am?f(r.am):'—'}</td><td class="ad">${r.ak?f(r.ak):'—'}</td>
      <td class="ad">${r.ao?f(r.ao):'—'}</td>
      <td class="ad">${f(r.at)}</td>
      <td class="hi">${f(r.t)}</td>
      <td style="color:var(--text2)">${f(cum)}</td>
    </tr>`;
  });
  const wd=d.daily.filter(r=>r.w);
  if(wd.length>0){
    html+=`<tr class="sum-row"><td colspan="2">合計</td><td>${wd.reduce((s,r)=>s+r.c,0)}</td>
      <td class="hi">${f(wd.reduce((s,r)=>s+r.b,0))}</td>
      <td class="ad">${f(wd.reduce((s,r)=>s+r.an,0))}</td><td class="ad">${f(wd.reduce((s,r)=>s+r.ag,0))}</td>
      <td class="ad">${f(wd.reduce((s,r)=>s+r.ar,0))}</td><td class="ad">${f(wd.reduce((s,r)=>s+r.af,0))}</td>
      <td class="ad">${f(wd.reduce((s,r)=>s+r.am,0))}</td><td class="ad">${f(wd.reduce((s,r)=>s+r.ak,0))}</td>
      <td class="ad">${f(wd.reduce((s,r)=>s+r.ao,0))}</td>
      <td class="ad">${f(wd.reduce((s,r)=>s+r.at,0))}</td>
      <td class="hi">${f(wd.reduce((s,r)=>s+r.t,0))}</td><td>—</td></tr>`;
  }
  document.getElementById('daily-tbody').innerHTML=html;
}

function setSort(k,btn){
  currentSort=k;
  document.querySelectorAll('.sort-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderRanking();
}

function renderRanking(){
  const members = getMembers(currentMonth);
  const s=[...members].sort((a,b)=>b[currentSort]-a[currentSort]);
  const tot=members.reduce((x,m)=>x+m.total,0);
  const aa=members.reduce((x,m)=>x+m.achieve,0)/members.length;
  const ar=members.reduce((x,m)=>x+m.add_rate,0)/members.length;
  const er=members.reduce((x,m)=>x+m.ext_rate,0)/members.length;
  const over=members.filter(m=>m.achieve>=100).length;

  document.getElementById('kpi-ranking').innerHTML=`
    <div class="kpi-card"><div class="kpi-label">チーム合計売上</div><div class="kpi-value blue">¥${Math.round(tot/10000)}万</div><div class="kpi-sub">${members.length}名合計</div></div>
    <div class="kpi-card"><div class="kpi-label">平均達成率</div><div class="kpi-value ${aa>=100?'green':aa>=80?'yellow':'red'}">${p(aa)}</div><div class="kpi-sub">目標達成 ${over}名/${members.length}名</div></div>
    <div class="kpi-card"><div class="kpi-label">平均追加率</div><div class="kpi-value ${ar>=80?'green':ar>=50?'yellow':'red'}">${p(ar)}</div><div class="kpi-sub">最高 ${p(Math.max(...members.map(m=>m.add_rate)))}</div></div>
    <div class="kpi-card"><div class="kpi-label">平均外機付帯率</div><div class="kpi-value ${er>=20?'green':er>=10?'yellow':'red'}">${p(er)}</div><div class="kpi-sub">最高 ${p(Math.max(...members.map(m=>m.ext_rate)))}</div></div>
  `;

  const ms=Math.max(...members.map(m=>m.total));
  let html='';
  s.forEach((m,i)=>{
    const rc=i===0?'r1':i===1?'r2':i===2?'r3':'';
    const ri=i===0?'🥇':i===1?'🥈':i===2?'🥉':`${i+1}`;
    const ab=m.achieve>=100?'ov':m.achieve>=80?'mi':'un';
    html+=`<tr style="cursor:pointer" onclick="jumpToMember('${m.name}')">
      <td class="${rc}">${ri}</td><td>${m.name}</td>
      <td>${m.days}日</td>
      <td><div class="bar-wrap"><span>¥${Math.round(m.total/10000)}万</span><div class="bar-bg"><div class="bar-fill" style="width:${Math.round(m.total/ms*100)}%"></div></div></div></td>
      <td><span class="badge ${ab}">${p(m.achieve)}</span></td>
      <td><div class="bar-wrap"><span>${p(m.add_rate)}</span><div class="bar-bg"><div class="bar-fill o" style="width:${Math.min(m.add_rate,100)}%"></div></div></div></td>
      <td><div class="bar-wrap"><span>${p(m.ext_rate)}</span><div class="bar-bg"><div class="bar-fill g" style="width:${Math.min(m.ext_rate*5,100)}%"></div></div></div></td>
      <td>¥${m.day_avg?Math.round(m.day_avg/1000)+'k':'—'}</td>
    </tr>`;
  });
  document.getElementById('rank-tbody').innerHTML=html;
}

function jumpToMember(name){
  document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
  document.getElementById('page-daily').classList.add('active');
  document.querySelectorAll('.tab')[0].classList.add('active');
  document.getElementById('member-select').value = name;
  renderDaily();
}

function switchPage(p,btn){
  document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
  document.getElementById('page-'+p).classList.add('active');
  btn.classList.add('active');
}

// 初期化
updateMemberSelect();
document.getElementById('member-select').value = '濱口';
renderDaily();
renderRanking();
document.getElementById('header-badge').textContent = 'チーム中山 — R8年3月 実績';
</script>
