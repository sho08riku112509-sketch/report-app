<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>配車表</title>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-messaging-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f0f0f;--card:#1a1a1a;--card-border:#2a2a2a;--accent:#ff6b00;--accent2:#ff9500;--text:#f0f0f0;--text-sub:#888;--text-muted:#555;--input-bg:#111;--input-border:#333;--success-bg:#0f3a1a;--success-text:#4ade80;--error-bg:#3a0f0f;--error-text:#f87171;--warn-text:#fbbf24}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-text-size-adjust:100%;padding-bottom:80px}
.header{position:sticky;top:0;z-index:100;background:var(--card);border-bottom:1px solid var(--card-border);padding:10px 12px}
.header-top{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.header h1{font-size:18px;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.spacer{flex:1}
.sync-badge{font-size:10px;padding:2px 8px;border-radius:12px;font-weight:600}
.sync-badge.connected{background:var(--success-bg);color:var(--success-text)}
.sync-badge.disconnected{background:var(--error-bg);color:var(--error-text)}
.sync-badge.syncing{background:#3a3a0f;color:var(--warn-text)}
.header-row2{display:flex;align-items:center;gap:6px;margin-top:8px}
.date-input{background:var(--input-bg);border:1px solid var(--input-border);border-radius:6px;color:var(--text);padding:4px 8px;font-size:12px;outline:none}
.area-tabs{display:flex;gap:0;margin-top:8px}
.area-tab{flex:1;padding:10px 0;text-align:center;font-size:14px;font-weight:700;border:none;cursor:pointer;background:transparent;color:var(--text-muted);border-bottom:2px solid transparent;transition:.2s}
.area-tab.active{color:var(--accent);border-bottom-color:var(--accent);background:rgba(255,107,0,.08)}
.area-tab .cnt{font-size:11px;font-weight:400;margin-left:4px;color:var(--text-sub)}
.btn{border:none;border-radius:8px;cursor:pointer;font-weight:600;font-size:13px;padding:8px 16px;transition:opacity .15s;white-space:nowrap}
.btn:active{opacity:.7}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff}
.btn-danger{background:var(--error-bg);color:var(--error-text);border:1px solid rgba(248,113,113,.3)}
.btn-ghost{background:transparent;color:var(--text-sub);border:1px solid var(--card-border)}
.btn-sm{padding:4px 10px;font-size:12px;border-radius:6px}
.btn-block{width:100%}
.card{background:var(--card);border:1px solid var(--card-border);border-radius:12px;padding:14px;margin-bottom:10px}
.card h2{font-size:14px;font-weight:600;margin-bottom:10px}
.input{width:100%;padding:10px 12px;background:var(--input-bg);border:1px solid var(--input-border);border-radius:8px;color:var(--text);font-size:16px;outline:none;font-family:inherit}
textarea{width:100%;padding:10px 12px;background:var(--input-bg);border:1px solid var(--input-border);border-radius:8px;color:var(--text);font-size:14px;outline:none;font-family:inherit;min-height:100px;resize:vertical;line-height:1.6}
.trip-btns{display:flex;gap:6px;margin-bottom:10px}
.trip-btn{width:48px;height:48px;border-radius:10px;border:2px solid var(--input-border);background:var(--input-bg);color:var(--text);font-size:18px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s}
.trip-btn.active{border-color:var(--accent);background:rgba(255,107,0,.15);color:var(--accent)}
.cargo-row{display:flex;gap:6px;align-items:center;margin-bottom:6px}
.cargo-type-btn{padding:8px 16px;border-radius:8px;border:2px solid var(--input-border);background:var(--input-bg);color:var(--text);font-size:15px;font-weight:700;cursor:pointer;transition:.15s;min-width:50px;text-align:center}
.cargo-type-btn.active{border-color:var(--accent);background:rgba(255,107,0,.15);color:var(--accent)}
.cargo-num{width:60px;padding:8px;background:var(--input-bg);border:1px solid var(--input-border);border-radius:8px;color:var(--text);font-size:16px;text-align:center;outline:none}
.cargo-add-btn{width:40px;height:40px;border-radius:8px;border:1px dashed var(--input-border);background:transparent;color:var(--text-sub);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.cargo-remove-btn{width:32px;height:32px;border-radius:6px;border:none;background:var(--error-bg);color:var(--error-text);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.dest-input-wrap{position:relative;margin-bottom:10px}
.dest-suggestions{position:absolute;top:100%;left:0;right:0;background:var(--card);border:1px solid var(--card-border);border-radius:0 0 8px 8px;z-index:50;max-height:200px;overflow-y:auto}
.dest-suggest-item{padding:12px;font-size:14px;cursor:pointer;border-bottom:1px solid var(--card-border)}
.dest-suggest-item:active{background:rgba(255,107,0,.15)}
.dest-suggest-item .sub{font-size:11px;color:var(--text-sub)}
.route-item{display:flex;align-items:center;gap:8px;padding:10px;margin-bottom:4px;border-radius:8px;border:2px solid transparent;font-size:14px;transition:.15s;user-select:none;cursor:pointer;min-height:48px}
.route-item.selected{background:rgba(255,107,0,.13);border-color:var(--accent)}
.route-item .trip-num{color:var(--accent);font-weight:700;min-width:36px}
.route-item .cargo{color:var(--text-sub)}
.route-item .dest{font-weight:500;flex:1}
.route-item .remove-btn{background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:16px;padding:4px 8px;min-width:32px;min-height:32px;display:flex;align-items:center;justify-content:center}
.unassign-btn{font-size:11px;padding:2px 8px;border-radius:6px;border:1px solid var(--input-border);background:none;color:var(--text-sub);cursor:pointer;min-height:28px}
.driver-bar{position:fixed;bottom:0;left:0;right:0;z-index:100;background:var(--card);border-top:1px solid var(--card-border);padding:8px 10px;display:flex;gap:6px;flex-wrap:wrap;justify-content:center}
.driver-bar-btn{padding:10px 14px;border-radius:10px;cursor:pointer;font-size:13px;font-weight:700;border:2px solid;min-height:44px;display:flex;align-items:center;justify-content:center;transition:.15s}
.driver-bar-btn:active{opacity:.7;transform:scale(.95)}
.driver-bar-btn .cnt{font-size:10px;font-weight:400;margin-left:4px;opacity:.7}
.preview{background:var(--input-bg);border-radius:8px;padding:12px;font-size:13px;line-height:1.8;white-space:pre-wrap;font-family:monospace}
.toast{position:fixed;top:70px;left:50%;transform:translateX(-50%);padding:10px 24px;border-radius:8px;z-index:200;font-weight:600;font-size:14px;box-shadow:0 4px 12px rgba(0,0,0,.4)}
.toast.success{background:var(--success-bg);color:var(--success-text)}
.toast.error{background:var(--error-bg);color:var(--error-text)}
.container{padding:12px;max-width:900px;margin:0 auto}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);z-index:300;display:flex;align-items:flex-start;justify-content:center;padding:20px;overflow-y:auto}
.modal{background:var(--card);border:1px solid var(--card-border);border-radius:16px;padding:20px;width:100%;max-width:500px;margin-top:20px}
.modal h2{font-size:16px;margin-bottom:16px}
.master-item{display:flex;align-items:center;gap:8px;padding:10px;border-bottom:1px solid var(--card-border);font-size:13px}
.master-item .info{flex:1}
.master-item .zip{color:var(--accent);font-weight:600;font-size:12px}
.master-item .mname{font-weight:600}
.master-item .detail{color:var(--text-sub);font-size:12px}
@media(max-width:600px){.header{padding:8px 10px}.container{padding:8px}}
</style>
</head>
<body>
<div class="header">
 <div class="header-top">
  <h1>配車表</h1><div class="spacer"></div>
  <span id="syncBadge" class="sync-badge syncing">接続中...</span>
  <button class="btn btn-primary btn-sm" onclick="copyResult()">結果コピー</button>
  <button class="btn btn-danger btn-sm" onclick="clearAll()">全クリア</button>
 </div>
 <div style="display:flex;gap:6px;margin-top:8px">
  <button class="btn btn-primary" style="flex:1;padding:12px;font-size:15px" onclick="showMasterModal()">内容登録</button>
  <button class="btn btn-ghost" style="padding:12px;font-size:13px" id="myNameBtn" onclick="showMyNameModal()">自分の名前</button>
 </div>
 <div class="header-row2">
  <label style="font-size:12px;color:var(--text-sub)">日付:</label>
  <input type="date" id="roomDate" class="date-input" onchange="switchRoom(this.value)">
  <button class="btn btn-ghost btn-sm" onclick="goToday()">今日</button>
  <button class="btn btn-ghost btn-sm" onclick="goTomorrow()">明日</button>
 </div>
 <div class="area-tabs" id="areaTabs"></div>
</div>
<div class="container" id="app"></div>
<div class="driver-bar" id="driverBar"></div>
<div id="toast" class="toast" style="display:none;"></div>
<div id="masterModal" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeMasterModal()">
 <div class="modal">
  <h2>内容登録</h2>
  <div id="masterModeToggle" style="display:flex;gap:0;margin-bottom:12px">
   <button class="area-tab active" id="masterModeSingle" onclick="setMasterMode('single')" style="flex:1;padding:8px;font-size:13px">1件ずつ</button>
   <button class="area-tab" id="masterModeBulk" onclick="setMasterMode('bulk')" style="flex:1;padding:8px;font-size:13px">まとめて登録</button>
  </div>
  <div id="masterSingleForm">
   <div style="font-size:12px;color:var(--text-sub);margin-bottom:4px">便番号</div>
   <div class="trip-btns" id="masterTripBtns" style="margin-bottom:10px"></div>
   <div style="display:flex;gap:6px;margin-bottom:4px">
    <input id="masterZip" class="input" placeholder="郵便番号" style="flex:1;font-size:14px" inputmode="numeric" pattern="[0-9]*" oninput="lookupZip(this.value)">
    <input id="masterName" class="input" placeholder="苗字" style="flex:1;font-size:14px">
   </div>
   <div id="zipResult" style="font-size:12px;color:var(--text-sub);margin-bottom:8px;min-height:16px"></div>
   <input id="masterContent" class="input" placeholder="内容" style="margin-bottom:8px;font-size:14px">
   <input id="masterNote" class="input" placeholder="備考" style="margin-bottom:8px;font-size:14px">
   <div style="display:flex;gap:6px;margin-bottom:16px">
    <select id="masterArea" class="input" style="font-size:14px"></select>
    <button class="btn btn-primary" style="padding:12px 24px;font-size:15px" onclick="addMaster()">登録</button>
   </div>
  </div>
  <div id="masterBulkForm" style="display:none">
   <div style="font-size:12px;color:var(--text-sub);margin-bottom:8px">1行1件 スペース区切り: 便番号 郵便番号 苗字 内容</div>
   <textarea id="masterBulkInput" style="margin-bottom:8px;min-height:140px;font-size:14px;line-height:1.8"></textarea>
   <div style="display:flex;gap:6px;margin-bottom:16px">
    <select id="masterBulkArea" class="input" style="font-size:14px"></select>
    <button class="btn btn-primary" style="padding:12px 24px;font-size:15px" onclick="addMasterBulk()">まとめて登録</button>
   </div>
  </div>
  <button class="btn btn-ghost btn-block" style="margin-top:12px" onclick="closeMasterModal()">閉じる</button>
 </div>
</div>
<div id="myNameModal" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeMyNameModal()">
 <div class="modal">
  <h2>自分の名前を登録</h2>
  <p style="font-size:13px;color:var(--text-sub);margin-bottom:12px">名前を登録すると、自分に配車されたとき通知が届きます</p>
  <select id="myNameSelect" class="input" style="font-size:15px;margin-bottom:12px"></select>
  <button class="btn btn-primary btn-block" style="padding:14px;font-size:16px" onclick="saveMyName()">登録する</button>
  <button class="btn btn-ghost btn-block" style="margin-top:8px" onclick="closeMyNameModal()">閉じる</button>
 </div>
</div>
<script>
// ===== Config =====
var FIREBASE_CONFIG={apiKey:"AIzaSyCkETt4udtIVVtHMTyyentSyup08_fTuKI",authDomain:"haisha-fd5a6.firebaseapp.com",databaseURL:"https://haisha-fd5a6-default-rtdb.firebaseio.com",projectId:"haisha-fd5a6",storageBucket:"haisha-fd5a6.firebasestorage.app",messagingSenderId:"217424745404",appId:"1:217424745404:web:485ca0f1649583927dd1b9",measurementId:"G-9QDNBRVY8H"};
var AREAS=["三重","四日市","名古屋西"];
var DEFAULT_DRIVERS=[
  {id:"d1",name:"瀬古",color:"#ff6b00"},{id:"d2",name:"米田",color:"#3b82f6"},
  {id:"d3",name:"藤本",color:"#22c55e"},{id:"d4",name:"大田",color:"#a855f7"},
  {id:"d5",name:"大澤",color:"#ef4444"},{id:"d6",name:"坂本",color:"#06b6d4"},
  {id:"d7",name:"平岡",color:"#f59e0b"},{id:"d8",name:"田邊",color:"#ec4899"},
  {id:"d9",name:"積木",color:"#14b8a6"}
];
var DRIVER_COLORS=["#ff6b00","#3b82f6","#22c55e","#a855f7","#ef4444","#06b6d4","#f59e0b","#ec4899","#14b8a6","#8b5cf6"];
var db=null,currentRoom="",dbRef=null,masterRef=null;
var routes=[],drivers=[];
var selectedRoutes=new Set();
var currentArea=AREAS[0];

function genId(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7)}
function esc(s){var d=document.createElement("div");d.textContent=s;return d.innerHTML}

// ===== Firebase =====
function initFirebase(){
  try{
    if(!firebase.apps.length)firebase.initializeApp(FIREBASE_CONFIG);
    db=firebase.database();
    db.ref(".info/connected").on("value",function(s){
      setSyncStatus(s.val()?"connected":"disconnected");
    });
    masterRef=db.ref("masters");
    return true;
  }catch(e){
    console.error("Firebase error:",e);
    setSyncStatus("disconnected");
    return false;
  }
}

function setSyncStatus(s){
  var el=document.getElementById("syncBadge");
  if(!el)return;
  if(s==="connected"){el.textContent="同期済み";el.className="sync-badge connected"}
  else if(s==="disconnected"){el.textContent="未接続";el.className="sync-badge disconnected"}
  else{el.textContent="同期中...";el.className="sync-badge syncing"}
}

// ===== Room =====
function getTodayStr(){var d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0")}
function getTomorrowStr(){var d=new Date();d.setDate(d.getDate()+1);return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0")}
function getRoomFromHash(){var m=location.hash.match(/room=(\d{4}-\d{2}-\d{2})/);return m?m[1]:null}
function switchRoom(v){if(!v)return;currentRoom=v;location.hash="room="+v;document.getElementById("roomDate").value=v;selectedRoutes.clear();subscribeRoom(v)}
function goToday(){switchRoom(getTodayStr())}
function goTomorrow(){switchRoom(getTomorrowStr())}

function subscribeRoom(roomId){
  if(dbRef)dbRef.off();
  if(!db){
    routes=JSON.parse(localStorage.getItem("dr_"+roomId)||"[]");
    drivers=JSON.parse(localStorage.getItem("dd_"+roomId)||JSON.stringify(DEFAULT_DRIVERS));
    render();return;
  }
  dbRef=db.ref("dispatch/"+roomId);
  setSyncStatus("syncing");
  dbRef.on("value",function(snap){
    var data=snap.val();
    if(data){
      routes=data.routes||[];
      drivers=data.drivers||JSON.parse(JSON.stringify(DEFAULT_DRIVERS));
    }else{
      routes=[];
      drivers=JSON.parse(JSON.stringify(DEFAULT_DRIVERS));
      save();
    }
    checkRouteChanges(routes);
    selectedRoutes.clear();
    render();
    setSyncStatus("connected");
  },function(err){
    console.error("DB read error:",err);
    setSyncStatus("disconnected");
    routes=JSON.parse(localStorage.getItem("dr_"+roomId)||"[]");
    drivers=JSON.parse(localStorage.getItem("dd_"+roomId)||JSON.stringify(DEFAULT_DRIVERS));
    render();
  });
}

function save(){
  if(db&&dbRef){
    dbRef.set({routes:routes,drivers:drivers}).catch(function(e){
      console.error("Save error:",e);
      showToast("保存エラー: "+e.message,"error");
    });
  }
  localStorage.setItem("dr_"+currentRoom,JSON.stringify(routes));
  localStorage.setItem("dd_"+currentRoom,JSON.stringify(drivers));
}

// ===== 郵便番号検索 =====
var zipTimer=null;
function lookupZip(val){
  var el=document.getElementById("zipResult");
  val=val.replace(/[^0-9]/g,"");
  if(val.length<3){el.textContent="";return}
  if(zipTimer)clearTimeout(zipTimer);
  zipTimer=setTimeout(function(){
    fetch("https://zipcloud.ibsnet.co.jp/api/search?zipcode="+val)
      .then(function(r){return r.json()})
      .then(function(data){
        if(data.results&&data.results.length>0){
          var r=data.results[0];
          el.textContent="〒"+r.zipcode+" "+r.address1+r.address2+r.address3;
          el.style.color="var(--success-text)";
        }else{
          el.textContent=val.length>=7?"該当なし":"";
          el.style.color="var(--text-sub)";
        }
      }).catch(function(){el.textContent=""});
  },300);
}

// ===== 内容登録（ルート追加） =====
var masterMode="single";
var masterTripNum=1;
function setMasterMode(mode){
  masterMode=mode;
  document.getElementById("masterSingleForm").style.display=mode==="single"?"block":"none";
  document.getElementById("masterBulkForm").style.display=mode==="bulk"?"block":"none";
  document.getElementById("masterModeSingle").className="area-tab"+(mode==="single"?" active":"");
  document.getElementById("masterModeBulk").className="area-tab"+(mode==="bulk"?" active":"");
}
function setMasterTripNum(n){
  masterTripNum=n;
  renderMasterTripBtns();
}
function renderMasterTripBtns(){
  var el=document.getElementById("masterTripBtns");if(!el)return;
  el.innerHTML=[1,2,3,4,6].map(function(i){return '<div class="trip-btn'+(masterTripNum===i?' active':'')+'" onclick="setMasterTripNum('+i+')">'+i+'</div>'}).join("");
}
function showMasterModal(){
  document.getElementById("masterModal").style.display="flex";
  var sel=document.getElementById("masterArea");
  sel.innerHTML=AREAS.map(function(a){return '<option value="'+a+'">'+a+'</option>'}).join("");
  sel.value=currentArea;
  var sel2=document.getElementById("masterBulkArea");
  sel2.innerHTML=AREAS.map(function(a){return '<option value="'+a+'">'+a+'</option>'}).join("");
  sel2.value=currentArea;
  renderMasterTripBtns();
}
function closeMasterModal(){document.getElementById("masterModal").style.display="none"}

function addMaster(){
  var zip=document.getElementById("masterZip").value.trim();
  var name=document.getElementById("masterName").value.trim();
  var content=document.getElementById("masterContent").value.trim();
  var note=document.getElementById("masterNote").value.trim();
  var area=document.getElementById("masterArea").value;
  if(!name){showToast("苗字を入力してください","error");return}
  routes.push({id:genId(),tripNum:masterTripNum,destination:name,cargo:content,area:area,driverId:null,note:note,zip:zip});
  save();
  document.getElementById("masterZip").value="";
  document.getElementById("masterName").value="";
  document.getElementById("masterContent").value="";
  document.getElementById("masterNote").value="";
  showToast(masterTripNum+"便 "+name+" "+content+" を追加");
  render();
}

function addMasterBulk(){
  var ta=document.getElementById("masterBulkInput");
  var text=ta.value.trim();
  if(!text){showToast("入力してください","error");return}
  var area=document.getElementById("masterBulkArea").value;
  var lines=text.split("\n").filter(function(l){return l.trim()});
  var count=0;
  lines.forEach(function(line){
    var parts=line.trim().split(/[\s\u3000]+/);
    if(parts.length<3){return}
    var tripNum=parseInt(parts[0]);
    if(isNaN(tripNum)){return}
    var zip="",name="",content="";
    if(/^\d+$/.test(parts[1])){
      zip=parts[1];name=parts[2];content=parts.slice(3).join(".");
    }else{
      name=parts[1];content=parts.slice(2).join(".");
    }
    if(!name)return;
    routes.push({id:genId(),tripNum:tripNum,destination:name,cargo:content,area:area,driverId:null,note:"",zip:zip});
    count++;
  });
  if(count===0){showToast("登録できるデータがありませんでした","error");return}
  save();
  ta.value="";
  showToast(count+"件まとめて登録しました");
  render();
}

// ===== Toast =====
var toastTimer=null;
function showToast(msg,type){
  type=type||"success";
  var el=document.getElementById("toast");el.textContent=msg;
  el.className="toast "+type;el.style.display="block";
  if(toastTimer)clearTimeout(toastTimer);
  toastTimer=setTimeout(function(){el.style.display="none"},2500);
}

// ===== Actions =====
function removeRoute(id){routes=routes.filter(function(r){return r.id!==id});selectedRoutes.delete(id);save();render()}
function toggleSelect(id){if(selectedRoutes.has(id))selectedRoutes.delete(id);else selectedRoutes.add(id);render()}
function selectAll(){
  var ar=routes.filter(function(r){return r.area===currentArea&&!r.driverId});
  if(ar.every(function(r){return selectedRoutes.has(r.id)})){selectedRoutes.clear()}
  else{ar.forEach(function(r){selectedRoutes.add(r.id)})}
  render();
}
function assignToDriver(driverId){
  if(selectedRoutes.size===0){showToast("便を選択してください","error");return}
  var cnt=selectedRoutes.size;
  selectedRoutes.forEach(function(id){var r=routes.find(function(r){return r.id===id});if(r)r.driverId=driverId});
  var d=drivers.find(function(d){return d.id===driverId});
  showToast(d.name+"に"+cnt+"件割り当て");
  selectedRoutes.clear();save();render();
}
function unassignRoute(id){var r=routes.find(function(r){return r.id===id});if(r)r.driverId=null;save();render()}

function clearAll(){
  if(!confirm("この日の全データをクリアしますか？"))return;
  routes=[];selectedRoutes.clear();save();render();showToast("クリアしました");
}

function copyResult(){
  var parts=[];
  drivers.forEach(function(d){
    var dr=routes.filter(function(r){return r.driverId===d.id});if(dr.length===0)return;
    parts.push(dr.map(function(r){return r.tripNum+"便 "+r.destination+" "+r.cargo+(r.note?" ("+r.note+")":"")}).join("\n")+"\n"+d.name);
  });
  var un=routes.filter(function(r){return!r.driverId});
  var text=parts.join("\n\n");
  if(un.length>0)text+="\n\n【未割り当て】\n"+un.map(function(r){return r.tripNum+"便 "+r.destination+" "+r.cargo}).join("\n");
  if(!text){showToast("コピーするデータがありません","error");return}
  navigator.clipboard.writeText(text).then(function(){showToast("コピーしました")});
}

function showAddDriver(){
  var name=prompt("作業者名を入力");
  if(!name||!name.trim())return;
  var n=name.trim();
  if(drivers.some(function(d){return d.name===n})){showToast("既に存在します","error");return}
  drivers.push({id:genId(),name:n,color:DRIVER_COLORS[drivers.length%DRIVER_COLORS.length]});
  save();render();showToast(n+"を追加");
}

// ===== Area =====
function setArea(a){currentArea=a;selectedRoutes.clear();render()}
function renderAreaTabs(){
  var el=document.getElementById("areaTabs");
  el.innerHTML=AREAS.map(function(a){
    var cnt=routes.filter(function(r){return r.area===a}).length;
    return '<button class="area-tab'+(a===currentArea?' active':'')+'" onclick="setArea(\''+a+'\')">'+esc(a)+'<span class="cnt">'+(cnt>0?cnt:"")+'</span></button>';
  }).join("");
}

// ===== Render =====
function renderDriverBar(){
  var el=document.getElementById("driverBar");
  el.innerHTML=drivers.map(function(d){
    var cnt=routes.filter(function(r){return r.driverId===d.id}).length;
    return '<button class="driver-bar-btn" style="background:'+d.color+'22;border-color:'+d.color+';color:'+d.color+'" onclick="assignToDriver(\''+d.id+'\')">'+esc(d.name)+'<span class="cnt">'+(cnt>0?"("+cnt+")":"")+'</span></button>';
  }).join("")+'<button class="driver-bar-btn" style="background:var(--input-bg);border-color:var(--input-border);color:var(--text-sub)" onclick="showAddDriver()">+</button>';
}

function renderSelectionInfo(){}

function render(){
  renderAreaTabs();
  renderDriverBar();
  renderSelectionInfo();
  var app=document.getElementById("app");
  var areaRoutes=routes.filter(function(r){return r.area===currentArea});
  var unassigned=areaRoutes.filter(function(r){return!r.driverId});
  var html='';

  if(areaRoutes.length===0){
    html+='<div class="card" style="text-align:center;padding:40px 20px">';
    html+='<div style="font-size:14px;color:var(--text-muted);margin-bottom:12px">登録された便がありません</div>';
    html+='<button class="btn btn-primary" style="padding:12px 24px;font-size:15px" onclick="showMasterModal()">内容登録</button>';
    html+='</div>';
  }

  if(unassigned.length>0){
    html+='<div class="card">';
    html+='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">';
    html+='<h2 style="margin:0">未割り当て ('+unassigned.length+'件)</h2>';
    html+='<button class="btn btn-ghost btn-sm" onclick="selectAll()">'+(unassigned.every(function(r){return selectedRoutes.has(r.id)})?'選択解除':'全選択')+'</button>';
    html+='</div>';
    unassigned.forEach(function(r){
      var sel=selectedRoutes.has(r.id);
      html+='<div class="route-item'+(sel?' selected':'')+'" onclick="toggleSelect(\''+r.id+'\')">';
      html+='<span class="trip-num">'+r.tripNum+'便</span>';
      html+='<span class="dest">'+esc(r.destination)+(r.note?'<span class="note-text" style="font-size:11px;color:var(--warn-text);margin-left:4px">'+esc(r.note)+'</span>':'')+'</span>';
      html+='<span class="cargo">'+esc(r.cargo)+'</span>';
      html+='<button class="remove-btn" onclick="event.stopPropagation();removeRoute(\''+r.id+'\')">×</button>';
      html+='</div>';
    });
    html+='</div>';
  }

  var dwith=drivers.filter(function(d){return areaRoutes.some(function(r){return r.driverId===d.id})});
  if(dwith.length>0){
    html+='<div class="card"><h2>割り当て済み</h2>';
    dwith.forEach(function(d){
      var dr=areaRoutes.filter(function(r){return r.driverId===d.id});
      html+='<div style="margin-bottom:12px">';
      html+='<div style="font-weight:700;color:'+d.color+';margin-bottom:4px;font-size:14px">'+esc(d.name)+' ('+dr.length+'件)</div>';
      dr.forEach(function(r){
        html+='<div class="route-item" style="cursor:default">';
        html+='<span class="trip-num">'+r.tripNum+'便</span>';
        html+='<span class="dest">'+esc(r.destination)+(r.note?'<span style="font-size:11px;color:var(--warn-text);margin-left:4px">'+esc(r.note)+'</span>':'')+'</span>';
        html+='<span class="cargo">'+esc(r.cargo)+'</span>';
        html+='<button class="unassign-btn" onclick="unassignRoute(\''+r.id+'\')">戻す</button>';
        html+='<button class="remove-btn" onclick="removeRoute(\''+r.id+'\')">×</button>';
        html+='</div>';
      });
      html+='</div>';
    });
    html+='</div>';
  }

  var allAssigned=routes.filter(function(r){return r.driverId});
  if(allAssigned.length>0){
    html+='<div class="card"><h2>配車結果プレビュー（全エリア）</h2><div class="preview">';
    drivers.forEach(function(d){
      var dr=routes.filter(function(r){return r.driverId===d.id});if(dr.length===0)return;
      dr.forEach(function(r){html+=esc(r.tripNum+"便 "+r.destination+" "+r.cargo+(r.note?" ("+r.note+")":""))+"\n"});
      html+='<span style="color:'+d.color+';font-weight:700">'+esc(d.name)+'</span>\n\n';
    });
    var un=routes.filter(function(r){return!r.driverId});
    if(un.length>0){
      html+='<span style="color:var(--warn-text);font-weight:700">【未割り当て】</span>\n';
      un.forEach(function(r){html+=esc(r.tripNum+"便 "+r.destination+" "+r.cargo)+"\n"});
    }
    html+='</div></div>';
  }
  app.innerHTML=html;
}

// ===== My Name & Push Notifications (FCM) =====
var MY_NAME_KEY="dispatch_myname";
var FCM_TOKEN_KEY="dispatch_fcm_token";
var VAPID_KEY="BDW4DuPwBW338jiIdd8BiaKDaOw3aOLWr8udBBLMWzpbdhpB5-hrH3MNe3bcKm8WyQTFnFeNq0HU74aqdlu-9QU";
var fcmMessaging=null;
var prevRoutes=null;

function getMyName(){return localStorage.getItem(MY_NAME_KEY)||""}
function updateMyNameBtn(){
  var btn=document.getElementById("myNameBtn");
  var name=getMyName();
  btn.textContent=name?name+"（変更）":"自分の名前";
}
function showMyNameModal(){
  document.getElementById("myNameModal").style.display="flex";
  var sel=document.getElementById("myNameSelect");
  var cur=getMyName();
  sel.innerHTML='<option value="">-- 選択してください --</option>'+drivers.map(function(d){
    return '<option value="'+esc(d.name)+'"'+(d.name===cur?' selected':'')+'>'+esc(d.name)+'</option>';
  }).join("");
}
function closeMyNameModal(){document.getElementById("myNameModal").style.display="none"}
function saveMyName(){
  var sel=document.getElementById("myNameSelect");
  var name=sel.value;
  if(!name){showToast("名前を選択してください","error");return}
  localStorage.setItem(MY_NAME_KEY,name);
  updateMyNameBtn();
  closeMyNameModal();
  showToast(name+"で登録しました");
  setupFCM(name);
}

function setupFCM(userName){
  if(!("serviceWorker" in navigator)||!firebase.messaging)return;
  try{
    fcmMessaging=firebase.messaging();
    navigator.serviceWorker.register("/firebase-messaging-sw.js").then(function(reg){
      fcmMessaging.getToken({vapidKey:VAPID_KEY,serviceWorkerRegistration:reg}).then(function(token){
        if(token){
          localStorage.setItem(FCM_TOKEN_KEY,token);
          if(db)db.ref("fcmTokens/"+encodeURIComponent(userName)).set({token:token,name:userName,updatedAt:Date.now()});
          console.log("FCM token saved");
        }
      }).catch(function(e){console.log("FCM token error:",e)});
      fcmMessaging.onMessage(function(payload){
        var n=payload.notification||{};
        showToast(n.title||n.body||"通知");
      });
    });
  }catch(e){console.log("FCM setup error:",e)}
}

function sendNotification(title,body){
  if(!("Notification" in window)||Notification.permission!=="granted")return;
  try{new Notification(title,{body:body})}catch(e){}
}

function checkRouteChanges(newRoutes){
  if(!prevRoutes){prevRoutes=newRoutes.slice();return}
  var myName=getMyName();
  if(!myName){prevRoutes=newRoutes.slice();return}
  var myDriverId=null;
  drivers.forEach(function(d){if(d.name===myName)myDriverId=d.id});
  if(!myDriverId){prevRoutes=newRoutes.slice();return}
  var oldIds={};prevRoutes.forEach(function(r){oldIds[r.id]=r});
  var newAdded=newRoutes.filter(function(r){return!oldIds[r.id]});
  if(newAdded.length>0){
    sendNotification("新しい便が追加されました",newAdded.map(function(r){return r.tripNum+"便 "+r.destination+" "+r.cargo}).join(", "));
  }
  var newAssigned=newRoutes.filter(function(r){
    if(r.driverId!==myDriverId)return false;
    var old=oldIds[r.id];
    return!old||old.driverId!==myDriverId;
  });
  if(newAssigned.length>0){
    sendNotification("割り当てられました！",newAssigned.map(function(r){return r.tripNum+"便 "+r.destination+" "+r.cargo}).join(", "));
  }
  prevRoutes=newRoutes.slice();
}

location.hash="room="+currentRoom;

updateMyNameBtn();
if(getMyName())setupFCM(getMyName());
subscribeRoom(currentRoom);
window.addEventListener("hashchange",function(){var r=getRoomFromHash();if(r&&r!==currentRoom)switchRoom(r)});
